<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dice">
<meta name="theme-color" content="#1a1a2e">
<title>Dice Roller</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRGljZSBSb2xsZXIiLCJzaG9ydF9uYW1lIjoiRGljZSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMWExYTJlIiwidGhlbWVfY29sb3IiOiIjMWExYTJlIn0=">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.4);
    --text: #eee;
    --text-dim: #8892a4;
    --dice-face: #f8f0e3;
    --dice-dot: #1a1a2e;
    --dice-shadow: rgba(0,0,0,0.35);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    min-height: 100dvh;
  }

  /* === Dice Count Selector === */
  .selector {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--surface);
    padding: 6px;
    border-radius: 16px;
  }

  .selector button {
    width: 52px;
    height: 44px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }

  .selector button.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .selector button:not(.active):active {
    transform: scale(0.92);
  }

  /* === Dice Area === */
  .dice-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 340px;
    min-height: 200px;
    flex: 0 0 auto;
  }

  /* === Single Die === */
  .die {
    width: 90px;
    height: 90px;
    background: var(--dice-face);
    border-radius: 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 14px;
    gap: 2px;
    box-shadow:
      0 6px 0 #d4c9b8,
      0 8px 24px var(--dice-shadow);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
  }

  .die.rolling {
    animation: diceShake 0.5s ease-in-out;
  }

  @keyframes diceShake {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-18deg) scale(0.9); }
    30%  { transform: rotate(15deg) scale(1.05); }
    45%  { transform: rotate(-10deg) scale(0.95); }
    60%  { transform: rotate(8deg) scale(1.02); }
    80%  { transform: rotate(-3deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .dot {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: transparent;
    transition: background 0.15s ease;
  }

  .dot.visible {
    background: var(--dice-dot);
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.2);
  }

  /* Dot positions for each value */
  /* Grid positions: TL TC TR | ML MC MR | BL BC BR → indices 0-8 */

  /* === Total Display === */
  .total {
    margin-top: 36px;
    font-size: 56px;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-glow);
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }

  .total.hidden {
    visibility: hidden;
  }

  .total.pop {
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0.3; }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* === Tap Hint === */
  .hint {
    position: fixed;
    bottom: max(32px, env(safe-area-inset-bottom, 20px));
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 0.5px;
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* === Number Toggle === */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text-dim);
  }

  .toggle {
    width: 44px;
    height: 26px;
    background: var(--surface);
    border-radius: 13px;
    border: 2px solid #2a3a5c;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all 0.25s ease;
  }

  .toggle.on {
    background: var(--accent);
    border-color: var(--accent);
  }

  .toggle.on::after {
    left: 20px;
    background: #fff;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* === Background Decoration === */
  .bg-glow {
    position: fixed;
    top: -40%;
    left: -20%;
    width: 140%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(233, 69, 96, 0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  /* === Responsive === */
  @media (max-height: 600px) {
    .die { width: 72px; height: 72px; padding: 11px; border-radius: 14px; }
    .total { font-size: 44px; margin-top: 24px; }
    .selector { margin-bottom: 20px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="selector" id="selector">
  <button data-count="1">1</button>
  <button data-count="2" class="active">2</button>
  <button data-count="3">3</button>
  <button data-count="4">4</button>
</div>

<div class="toggle-wrap" id="toggleWrap">
  <span>합계</span>
  <div class="toggle on" id="numToggle"></div>
</div>

<div class="dice-area" id="diceArea"></div>

<div class="total" id="total"></div>

<div class="hint">화면을 터치해서 굴리기</div>

<script>
  // Dot patterns for dice values 1-6
  // Grid: 0=TL, 1=TC, 2=TR, 3=ML, 4=MC, 5=MR, 6=BL, 7=BC, 8=BR
  const PATTERNS = {
    1: [4],
    2: [2, 6],
    3: [2, 4, 6],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8]
  };

  let diceCount = 2;
  let values = [1, 1];
  let isRolling = false;
  let showNumbers = true;

  const diceArea = document.getElementById('diceArea');
  const totalEl = document.getElementById('total');
  const selector = document.getElementById('selector');
  const numToggle = document.getElementById('numToggle');
  const toggleWrap = document.getElementById('toggleWrap');

  // Create dice
  function createDice() {
    diceArea.innerHTML = '';
    values = [];
    for (let i = 0; i < diceCount; i++) {
      const val = Math.ceil(Math.random() * 6);
      values.push(val);
      const die = document.createElement('div');
      die.className = 'die';
      die.dataset.index = i;
      for (let d = 0; d < 9; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (PATTERNS[val].includes(d)) dot.classList.add('visible');
        die.appendChild(dot);
      }
      diceArea.appendChild(die);
    }
    updateTotal(false);
  }

  function updateDie(die, val) {
    const dots = die.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
      dot.classList.toggle('visible', PATTERNS[val].includes(i));
    });
  }

  function updateTotal(animate = true) {
    const sum = values.reduce((a, b) => a + b, 0);
    totalEl.textContent = sum;
    if (animate && showNumbers) {
      totalEl.classList.remove('pop');
      void totalEl.offsetWidth;
      totalEl.classList.add('pop');
    }
  }

  function roll() {
    if (isRolling) return;
    isRolling = true;

    const dice = diceArea.querySelectorAll('.die');

    // Add rolling animation
    dice.forEach(die => {
      die.classList.add('rolling');
    });

    // Rapid random faces during animation
    let ticks = 0;
    const maxTicks = 8;
    const interval = setInterval(() => {
      dice.forEach((die, i) => {
        const tempVal = Math.ceil(Math.random() * 6);
        updateDie(die, tempVal);
      });
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(interval);

        // Final values
        dice.forEach((die, i) => {
          const finalVal = Math.ceil(Math.random() * 6);
          values[i] = finalVal;
          updateDie(die, finalVal);
          die.classList.remove('rolling');
        });

        updateTotal(true);

        // Haptic feedback if available
        if (navigator.vibrate) navigator.vibrate(30);

        isRolling = false;
      }
    }, 60);
  }

  // Total toggle
  numToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    showNumbers = !showNumbers;
    numToggle.classList.toggle('on', showNumbers);
    totalEl.classList.toggle('hidden', !showNumbers);
  });

  // Selector buttons
  selector.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-count]');
    if (!btn) return;
    selector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    diceCount = parseInt(btn.dataset.count);
    createDice();
  });

  // Touch / click to roll
  document.addEventListener('click', (e) => {
    if (e.target.closest('.selector') || e.target.closest('#toggleWrap')) return;
    roll();
  });

  // Prevent double-tap zoom on iOS
  document.addEventListener('touchend', (e) => {
    if (e.target.closest('.selector') || e.target.closest('#toggleWrap')) return;
    e.preventDefault();
    roll();
  }, { passive: false });

  // Init
  createDice();
</script>
</body>
</html>
